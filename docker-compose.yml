services:
  postgres:
    image: postgres:16-alpine
    container_name: stockflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: stockflow
      POSTGRES_PASSWORD: stockflow
      POSTGRES_DB: stockflow
    ports:
      - "5433:5432"
    volumes:
      - stockflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stockflow -d stockflow"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  stockflow_postgres_data:
